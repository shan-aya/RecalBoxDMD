# Info
info=1                      	# 0 = no info at boot, 1 = display info at boot

# Affichage
brightness=50			# luminosite de l afficheur 0-100 %, default = 50%
			
# Playlist
playlist=RecalBox_intros.txt         	# Plays the playlist specified in /playlist
random=1                    	# 0 = play in order, 1 = play randomly

# Wi-Fi & Bluetooth
wifi_enabled=1             	# 0 = Wi-Fi disabled, 1 = Wi-Fi enabled (keep at 1)
wifi_ssid=xxxx         	# Your Wi-Fi network name
wifi_password=xxxx  	# Your Wi-Fi password
bluetooth_enabled=0        	# 0 = Bluetooth disabled, 1 = Bluetooth enabled (keep at 0)
                            	# Enable if you experience interference (e.g. 8Bitdo Pro 3 controller)
bluetooth_name=ESP32-GIF    	# Bluetooth name

wifi_static_enabled=1       	# 0 = DHCP, 1 = static IP (recommended)
wifi_static_ip=192.168.0.46   	# Only if wifi_static_enabled=1
wifi_gateway=192.168.0.254      # Only if wifi_static_enabled=1
wifi_subnet=255.255.255.0       # Only if wifi_static_enabled=1
wifi_dns1=1.1.1.1               # Only if wifi_static_enabled=1
wifi_dns2=8.8.8.8               # Only if wifi_static_enabled=1

# MQTT
recalbox_ip=192.168.0.35  	# Fixed IP address of your Recalbox

# Clock (horloge retro themes)
[CLOCK]
CLOCK_ENABLED=1			# 0=OFF, 1=ON — affiche l'horloge périodiquement
CLOCK_THEME=-1			# -1=random, 0=Mario, 1=Tetris, 2=Pac-Man, 3=Space Invaders, 4=Pong, 5=Neon, 6=Matrix, 7=Fire, 8=Rainbow
CLOCK_INTERVAL=5		# nombre de GIFs avant d'afficher l'horloge
CLOCK_INTERVAL_MIN=0		# 0=desactive (utilise CLOCK_INTERVAL en GIFs), >0 = minutes entre chaque horloge
CLOCK_DURATION=60		# secondes d'affichage de l'horloge (et secondes entre chaque changement de theme si random)
TZ=CET-1CEST,M3.5.0,M10.5.0/3	# fuseau horaire (timezone)
